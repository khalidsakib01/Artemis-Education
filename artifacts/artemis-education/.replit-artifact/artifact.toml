kind = "web"
previewPath = "/"
title = "Artemis Education"
version = "1.0.0"
id = "artifacts/artemis-education"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21580

[services.development]
run = "pnpm --filter @workspace/artemis-education run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/artemis-education", "run", "build" ]
publicDir = "artifacts/artemis-education/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21580"
BASE_PATH = "/"
